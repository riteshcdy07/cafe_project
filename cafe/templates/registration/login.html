<!DOCTYPE html>
<html>
<head>
    <title>Login - CafePro</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #fff7ed;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .login-box {
            width: 380px;
            background: white;
            padding: 30px;
            border-radius: 24px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
        }

        h2 {
            margin-bottom: 10px;
            color: #1f2937;
        }

        p {
            color: #6b7280;
            margin-bottom: 25px;
        }

        label {
            font-weight: bold;
            color: #374151;
            display: block;
            margin-bottom: 7px;
        }

        input {
            width: 100%;
            padding: 13px;
            border: 1px solid #fed7aa;
            border-radius: 14px;
            outline: none;
            background: #fff7ed;
            margin-bottom: 16px;
        }

        button {
            width: 100%;
            border: none;
            background: #f97316;
            color: white;
            padding: 14px;
            border-radius: 15px;
            font-weight: bold;
            cursor: pointer;
        }

        .error {
            background: #fee2e2;
            color: #dc2626;
            padding: 10px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 14px;
        }
    </style>
</head>

<body>

<div class="login-box">
    <h2>CafePro Login</h2>
    <p>Login to access your cafe system.</p>

    {% if form.errors %}
        <div class="error">
            Invalid username or password.
        </div>
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <label>Username</label>
        {{ form.username }}

        <label>Password</label>
        {{ form.password }}

        <button type="submit">Login</button>
    </form>
</div>

</body>
</html>
