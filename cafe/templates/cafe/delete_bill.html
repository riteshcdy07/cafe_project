{% load static %}

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Delete Bill</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            background: #fff7ed;
            color: #1f2937;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 30px;
        }

        .delete-card {
            width: 480px;
            background: white;
            border-radius: 28px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.08);
            text-align: center;
            animation: popIn 0.4s ease;
        }

        @keyframes popIn {
            from {
                opacity: 0;
                transform: scale(0.96) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }

        .icon {
            width: 75px;
            height: 75px;
            background: #fee2e2;
            color: #dc2626;
            border-radius: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 36px;
            margin: 0 auto 18px auto;
        }

        h1 {
            font-size: 28px;
            margin-bottom: 10px;
        }

        p {
            color: #6b7280;
            line-height: 1.6;
            margin-bottom: 20px;
        }

        .bill-box {
            background: #fff7ed;
            border: 1px dashed #fdba74;
            border-radius: 20px;
            padding: 18px;
            margin-bottom: 22px;
        }

        .bill-box h3 {
            color: #f97316;
            margin-bottom: 6px;
        }

        .bill-box p {
            margin-bottom: 0;
        }

        .button-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .delete-btn,
        .cancel-btn {
            border: none;
            text-decoration: none;
            padding: 14px;
            border-radius: 16px;
            font-weight: bold;
            cursor: pointer;
            font-size: 15px;
            transition: 0.3s ease;
        }

        .delete-btn {
            background: #dc2626;
            color: white;
        }

        .cancel-btn {
            background: #fff7ed;
            color: #f97316;
            border: 1px solid #fed7aa;
        }

        .delete-btn:hover,
        .cancel-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 25px rgba(220, 38, 38, 0.18);
        }
    </style>
</head>

<body>

<div class="delete-card">
    <div class="icon">🗑️</div>

    <h1>Delete Bill?</h1>

    <p>Are you sure you want to delete this bill? This action cannot be undone.</p>

    <div class="bill-box">
        <h3>BILL-{{ bill.id }}</h3>
        <p>{{ bill.customer_name }} | Rs. {{ bill.total_amount }}</p>
    </div>

    <form method="POST">
        {% csrf_token %}

        <div class="button-row">
            <button type="submit" class="delete-btn">Yes, Delete</button>
            <a href="{% url 'billing' %}" class="cancel-btn">Cancel</a>
        </div>
    </form>
</div>

</body>
</html>
